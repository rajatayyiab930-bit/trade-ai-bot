name: tradex_ai
description: TradeX AI - AI-Powered Trading Simulator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  socket_io_client: ^2.0.3+1
  fl_chart: ^0.65.0
  intl: ^0.18.1
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.1
  webview_flutter: ^4.4.1
  shimmer: ^3.0.0
  google_sign_in: ^6.1.5
  pinput: ^3.0.1
  animations: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

fonts:
  - family: Poppins
    fonts:
      - asset: assets/fonts/Poppins-Regular.ttf
      - asset: assets/fonts/Poppins-Medium.ttf
        weight: 500
      - asset: assets/fonts/Poppins-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Poppins-Bold.ttf
        weight: 700
